<div class="backdrop" (click)="cancel()" aria-hidden="true"></div>
<div class="panel" role="dialog" aria-labelledby="form-title">
  <h2 id="form-title">{{ user?.id != null ? 'Edit User' : 'Add User' }}</h2>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <form (ngSubmit)="submit()">
    <label>
      First name
      <input name="firstName" [(ngModel)]="formModel.firstName" required />
    </label>
    <label>
      Last name
      <input name="lastName" [(ngModel)]="formModel.lastName" required />
    </label>
    <label>
      Email
      <input name="email" type="email" [(ngModel)]="formModel.email" required />
    </label>
    <label>
      Note
      <textarea name="note" rows="3" [(ngModel)]="formModel.note"></textarea>
    </label>

    <div class="actions">
      <button type="submit" class="btn-save">Save</button>
      <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
    </div>
  </form>
</div>
